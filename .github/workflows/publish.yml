# Publishes this n8n community node package to npm on every version tag push.
# Uses OIDC Trusted Publishing for npm provenance without long-lived tokens.
#
# Release process:
#   1. npm version patch (or minor/major)
#   2. git push origin main <tag>
#   3. This workflow publishes to npm with provenance

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        # Direct publish bypasses `n8n-node release` lint step, which is
        # currently broken upstream (eslint-plugin-n8n-nodes-base calls
        # the ESLint-9 context.getFilename API but @n8n/node-cli bundles
        # ESLint 10 which removed it). OIDC via id-token: write grants
        # provenance without a long-lived token.
        run: npm publish --provenance --access public --ignore-scripts
